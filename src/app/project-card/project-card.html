<div class="card shadow text-center" (click)="OpenProjectModal()">
   
            <carousel (click)="$event.stopPropagation()">
                @for (picture of project.pictures; track picture) {
                    <slide>
                        <img src="{{picture}}"
                        style="width: 100%;"
                        (click)="OpenProjectModal(); $event.stopPropagation()">
                    </slide>
                }
            </carousel>
            <br>

     <div class="card-body">        
        <h5 class="card-title">{{ project.name }}</h5>
        <p class="card-text">{{ project.summary }}</p>
    </div>

    <div class="card-footer">
        <div class="d-flex flex-wrap justify-content-center">
            @for (tag of project.tags; track tag) {
                <!-- data binding! -->
                <div class="tag me-2 mb-1" [style.background-color]="tag.color">{{tag}}</div>
            }
        </div>
    </div>
</div>
