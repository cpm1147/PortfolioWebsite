<div class="modal-header">
    <h2>{{ project.name }}</h2>
    <button class="btn-close" (click)="bsModalRef.hide()"></button>
</div>

<div class="modal-body">
    <carousel>
        @for (picture of project.pictures; track picture) {
            <slide>
            <img src={{picture}} alt="slide" style="display: block; width: 100%;">
            </slide>
        }
    </carousel>

    <h3 class="mt-2">Description</h3>
    <p>{{project.description}}</p>

    <a class="btn btn-primary"
    [href]="project.projectLink"
    target="_blank">
    Live Project
    </a>
    
    <hr>
    <div class="d-flex flex-wrap">
        @for (tag of project.tags; track tag) {
                <div class="tag me-2 mb-1" [style.background-color]="tag.color">{{tag}}</div>
            }
    </div>
</div>
