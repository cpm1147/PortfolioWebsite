<div class="modal-header">
    <h2>{{ project.name }}</h2>
    <button class="btn-close" (click)="bsModalRef.hide()"></button>
</div>
<carousel>
        @for (media of project.media; track media) {
            <slide>
            <img src={{media}} alt="slide" style="display: block; width: 100%;">
            </slide>
        }
</carousel>
<div class="modal-body">
    <h3 class="mt-2">Description</h3>
    <p>{{project.description}}</p><br>

    <a *ngIf="project.showProjectLink"
    class="btn btn-primary"
    [href]="project.projectLink"
    target="_blank">
    View Project
    </a>
    
    <hr>
    <div class="d-flex flex-wrap">
        @for (tag of project.tags; track tag) {
                <div class="tag me-2 mb-1" [style.background-color]="tag.color">{{tag}}</div>
            }
    </div>
</div>
